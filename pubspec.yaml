name: tj_photo_editor
description: "TJ Photo Editor — AI-powered cross-platform photo editing app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Image picking / handling
  image_picker: ^1.1.2
  image: ^4.2.0           # pure-dart fallback ops (resize, basic adjust)
  photo_view: ^0.15.0     # pinch/pan canvas

  # Persistence
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Monetization (RevenueCat) — wire keys before release
  purchases_flutter: ^8.0.0

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # GPU fragment shaders (Impeller) for real-time adjustments/filters.
  shaders:
    - shaders/adjustments.frag

  # assets:
  #   - assets/ml/            # bundled TFLite models (Phase 2)
  #   - assets/passport/standards.json
